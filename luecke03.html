<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lückentext: ПОСМОТРИМ</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 750px;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--accent); margin-top: 0; }
        .instruction { text-align: center; color: #666; margin-bottom: 2rem; font-size: 0.95rem; }

        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sentence-item {
            background: #fff;
            padding: 18px;
            border-radius: 10px;
            border: 2px solid #eee;
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        .sentence-item.correct { border-color: var(--success); background: #f1fcf5; }
        .sentence-item.wrong { border-color: var(--error); background: #fff5f5; }

        .label-text { display: block; margin-bottom: 8px; font-weight: 500; color: var(--primary); }

        select {
            padding: 6px 12px;
            border-radius: 6px;
            border: 2px solid #ccc;
            font-size: 1rem;
            font-family: inherit;
            background-color: #fff;
            cursor: pointer;
            margin: 0 5px;
            outline: none;
        }

        .feedback-text {
            display: block;
            margin-top: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            min-height: 1.2rem;
        }

        .controls {
            margin-top: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        .reset-btn { background: #95a5a6; color: white; }
        .solution-btn { background: #f39c12; color: white; }
        .btn:hover { opacity: 0.9; }

        @media (max-width: 600px) {
            .container { padding: 1.2rem; }
            .controls { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Lückentext: ПОСМОТРИМ</h2>
    <p class="instruction">Wähle die passende Antwort. Das Feedback erscheint sofort nach deiner Auswahl.</p>
    
    <div class="sentence-list" id="quiz-area"></div>

    <div class="controls">
        <button class="btn reset-btn" onclick="initQuiz()">Neustart</button>
        <button class="btn solution-btn" onclick="showSolution()">Lösungen anzeigen</button>
    </div>
</div>

<script>
    const quizData = [
        {
            pre: "„Ты поедешь с нами кататься на сноубордах?“ – „У меня много работы и к родителям надо съездить... “",
            post: ".",
            answer: "посмотрим",
            info: "Richtig! Der Sprecher ist unentschieden und vertagt die Entscheidung."
        },
        {
            pre: "„Если ты не будешь заниматься, ты плохо сдашь экзамены!“ – „Ой, “",
            post: ".",
            answer: "посмотрим",
            info: "Korrekt! Eine abwartende Reaktion auf eine Vorhersage."
        },
        {
            pre: "„Что значит это слово?“ – „Сейчас мы это не знаем, но узнаем в будущем “",
            post: ".",
            answer: "посмотрим",
            info: "Genau! Das beschreibt die Kernbedeutung des Wortes."
        },
        {
            pre: "„Ты уже на 100% решил пойти in die Schule?“ – „ “",
            post: ", я уже собрал рюкзак.",
            answer: "да",
            info: "Richtig! Hier liegt eine klare Absicht vor, kein Abwarten."
        },
        {
            pre: "„Мы узнаем, как я сдам экзамены?“ – „ “",
            post: ", узнаем, но только в будущем.",
            answer: "да",
            info: "Richtig! Das ist eine Bestätigung der zukünftigen Erkenntnis."
        }
    ];

    const options = ["посмотрим", "да", "нет"];

    function initQuiz() {
        const area = document.getElementById('quiz-area');
        area.innerHTML = '';
        
        quizData.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'sentence-item';
            div.id = `item-${idx}`;
            div.innerHTML = `
                <span class="label-text">Aufgabe ${idx + 1}:</span>
                ${item.pre}
                <select id="sel-${idx}" onchange="validateEntry(${idx})">
                    <option value="">...</option>
                    ${options.map(o => `<option value="${o}">${o}</option>`).join('')}
                </select>
                ${item.post}
                <div id="feedback-${idx}" class="feedback-text"></div>
            `;
            area.appendChild(div);
        });
    }

    function validateEntry(idx) {
        const sel = document.getElementById(`sel-${idx}`);
        const feedback = document.getElementById(`feedback-${idx}`);
        const parent = document.getElementById(`item-${idx}`);
        const item = quizData[idx];

        if (sel.value === "") {
            parent.className = 'sentence-item';
            feedback.innerText = "";
            return;
        }

        if (sel.value === item.answer) {
            parent.className = 'sentence-item correct';
            feedback.innerText = "✓ " + item.info;
            feedback.style.color = "var(--success)";
        } else {
            parent.className = 'sentence-item wrong';
            feedback.innerText = "✗ Das passt hier nicht zum Kontext.";
            feedback.style.color = "var(--error)";
        }
    }

    function showSolution() {
        quizData.forEach((item, idx) => {
            const sel = document.getElementById(`sel-${idx}`);
            sel.value = item.answer;
            validateEntry(idx);
        });
    }

    initQuiz();
</script>

</body>
</html>
